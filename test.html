<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inscription</title>
    <style>
      :root {
        --bg: #0f1b2d;
        --bg-2: #13243a;
        --card: #152a45;
        --text: #f5f7fb;
        --muted: #b4c0d4;
        --accent: #5ee1b4;
        --accent-2: #4ac0ff;
        --danger: #ff7a7a;
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(900px 600px at 20% 10%, rgba(94, 225, 180, 0.18), transparent 60%),
          radial-gradient(700px 500px at 80% 20%, rgba(74, 192, 255, 0.15), transparent 55%),
          linear-gradient(140deg, var(--bg), var(--bg-2));
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      .card {
        width: min(960px, 100%);
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: 0 24px 60px rgba(9, 16, 27, 0.35);
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        overflow: hidden;
      }

      .hero {
        padding: 48px;
        background:
          linear-gradient(160deg, rgba(94, 225, 180, 0.18), rgba(21, 42, 69, 0.2)),
          url("data:image/svg+xml,%3Csvg width='240' height='240' viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='120' cy='120' r='90' fill='none' stroke='%235ee1b4' stroke-opacity='0.2' stroke-width='2'/%3E%3Ccircle cx='120' cy='120' r='50' fill='none' stroke='%234ac0ff' stroke-opacity='0.2' stroke-width='2'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: 12% 25%;
      }

      .hero h1 {
        margin: 0 0 12px;
        font-size: 2.2rem;
        line-height: 1.1;
      }

      .hero p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 1rem;
      }

      .hero ul {
        list-style: none;
        padding: 0;
        margin: 24px 0 0;
        display: grid;
        gap: 12px;
      }

      .hero li {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.95rem;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
      }

      .form-wrap {
        padding: 48px;
        display: grid;
        align-content: center;
        gap: 24px;
        background: rgba(10, 20, 35, 0.25);
        border-left: 1px solid rgba(255, 255, 255, 0.06);
      }

      form {
        display: grid;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 0.9rem;
        color: var(--muted);
      }

      input, select {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 0.95rem;
        outline: none;
      }

      input:focus, select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(94, 225, 180, 0.16);
      }

      .row {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 1rem;
        cursor: pointer;
        color: #0f1b2d;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        font-weight: 600;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 22px rgba(74, 192, 255, 0.2);
      }

      .muted {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .muted a {
        color: var(--accent-2);
        text-decoration: none;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(94, 225, 180, 0.12);
        color: var(--accent);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .note {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .required {
        color: var(--danger);
      }

      @media (max-width: 820px) {
        .card {
          grid-template-columns: 1fr;
        }

        .hero {
          padding: 36px;
        }

        .form-wrap {
          padding: 36px;
        }
      }

      @media (max-width: 520px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="hero">
        <span class="tag">Bienvenue</span>
        <h1>Inscription rapide</h1>
        <p>Cree ton compte en moins d'une minute et commence a utiliser la plateforme.</p>
        <ul>
          <li><span class="dot"></span> Acces immediat au tableau de bord</li>
          <li><span class="dot"></span> Profil personalisable</li>
          <li><span class="dot"></span> Notifications en temps reel</li>
        </ul>
      </section>
      <section class="form-wrap">
        <div>
          <h2>Creer un compte</h2>
          <p class="note">Champs obligatoires <span class="required">*</span></p>
        </div>
        <form>
          <div class="row">
            <div class="field">
              <label for="prenom">Prenom <span class="required">*</span></label>
              <input id="prenom" name="prenom" type="text" placeholder="Ex: Aline" required />
            </div>
            <div class="field">
              <label for="nom">Nom <span class="required">*</span></label>
              <input id="nom" name="nom" type="text" placeholder="Ex: Dupont" required />
            </div>
          </div>
          <div class="field">
            <label for="email">Email <span class="required">*</span></label>
            <input id="email" name="email" type="email" placeholder="exemple@mail.com" required />
          </div>
          <div class="field">
            <label for="role">Profil</label>
            <select id="role" name="role">
              <option value="client">Client</option>
              <option value="pro">Professionnel</option>
              <option value="etudiant">Etudiant</option>
            </select>
          </div>
          <div class="row">
            <div class="field">
              <label for="password">Mot de passe <span class="required">*</span></label>
              <input id="password" name="password" type="password" placeholder="8 caracteres minimum" required />
            </div>
            <div class="field">
              <label for="confirm">Confirmation <span class="required">*</span></label>
              <input id="confirm" name="confirm" type="password" placeholder="Retape le mot de passe" required />
            </div>
          </div>
          <div class="field">
            <label>
              <input type="checkbox" required />
              J'accepte les conditions d'utilisation
            </label>
          </div>
          <div class="actions">
            <button type="submit">Creer mon compte</button>
            <p class="muted">Deja inscrit ? <a href="#">Se connecter</a></p>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
